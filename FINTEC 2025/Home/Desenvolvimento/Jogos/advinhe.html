<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adivinhe o Animal</title>
  <link rel="stylesheet" href="advinhe.css">
</head>
<body>
  <div class="container">
    <h1>🐾 Adivinhe o Animal 🐾</h1>

    <div class="game-box">
      <p class="question">Qual é o animal?</p>

      <div class="image-box">
        <img id="animal-img" src="coala-bonito-pendurado-na-ilustracao-do-icone-do-vetor-dos-desenhos-animados-da-arvore-conceito-de-icone-da-natureza-animal-isolado_138676-8369.avif" alt="Animal misterioso">
      </div>

      <div id="word-display"></div>

      <input type="text" id="guess-input" placeholder="Digite sua resposta..." />
      <button id="check-btn">Verificar</button>

      <p id="feedback"></p>

      <button id="hint-btn">Dica 💡</button>
      <p id="hint"></p>
    </div>

    <button id="next-btn">Próximo 🐾</button>
  </div>

  <script src="advinhe.js"></script>
</body>
</html>
